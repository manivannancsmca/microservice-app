server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      filter:
        request-rate-limiter:
          deny-empty-key: true
          empty-key-status-code: 429
      routes:
        # 1. User Service Route (No Rate Limiting applied)
        - id: user-service-route
          uri: ${USER_SERVICE_URI:http://localhost:8011}
          predicates:
            - Path=/api/v1/users/**
          filters:
            # 1. Block abusive traffic/spikes at the edge
            - name: DynamicRateLimiter          # Matches your custom filter factory prefix
              args:
                routeId: user-service-route

            # 2. Resilient retry engine for downstream transient faults
            - name: Retry
              args:
                retries: 3
                # Retry on typical microservice failure codes
                statuses: INTERNAL_SERVER_ERROR, BAD_GATEWAY, SERVICE_UNAVAILABLE, GATEWAY_TIMEOUT
                # Explicitly retry on low-level network drops and connection timeouts
                exceptions: 
                  - java.io.IOException
                  - java.net.ConnectException
                  - io.netty.channel.ConnectTimeoutException
                # Only retry safe, idempotent HTTP methods
                methods: GET, HEAD, OPTIONS
                backoff:
                  firstBackoff: 1000ms
                  maxBackoff: 2000ms
                  factor: 2
                  basedOnPreviousValue: true # Adds random variance (jitter) to the retry curve

        # 2. Product Service Route (Dynamic Rate Limiting applied)
        - id: product-service-route
          uri: ${PRODUCT_SERVICE_URI:http://localhost:80120}
          predicates:
            - Path=/api/v1/products/**
          filters:
            # 1. Block abusive traffic/spikes at the edge
            - name: DynamicRateLimiter          # Matches your custom filter factory prefix
              args:
                routeId: product-service-route

            # 2. Resilient retry engine for downstream transient faults
            - name: Retry
              args:
                retries: 3
                series: SERVER_ERROR
                # Retry on typical microservice failure codes
                statuses: INTERNAL_SERVER_ERROR, BAD_GATEWAY, SERVICE_UNAVAILABLE, GATEWAY_TIMEOUT
                # Explicitly retry on low-level network drops and connection timeouts
                exceptions: 
                  - java.io.IOException
                  - java.net.ConnectException
                  - io.netty.channel.ConnectTimeoutException
                # Only retry safe, idempotent HTTP methods
                methods: GET, HEAD
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 1000ms
                  factor: 2
                  basedOnPreviousValue: true # Adds random variance (jitter) to the retry curve


  data:
    redis:
      # Kubernetes internal DNS to your Redis cluster/standalone service
      # host: redis-master.default.svc.cluster.local
      host: localhost # - local development 
      port: 6379
      # password: ${REDIS_PASSWORD} # Configure if using auth
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.value}


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    '[org.springframework.cloud.gateway]': DEBUG
    '[org.springframework.cloud.gateway.filter.factory.RetryGatewayFilterFactory]': TRACE