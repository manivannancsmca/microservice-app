server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      filter:
        request-rate-limiter:
          deny-empty-key: true
          empty-key-status-code: 429
      routes:
        # 1. User Service Route
        - id: user-service-route
          uri: ${USER_SERVICE_URI:http://localhost:8011}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: DynamicRateLimiter
              args:
                routeId: user-service-route

            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR, BAD_GATEWAY, SERVICE_UNAVAILABLE, GATEWAY_TIMEOUT
                exceptions: 
                  - java.io.IOException
                  - java.net.ConnectException
                  - io.netty.channel.ConnectTimeoutException
                methods: GET, HEAD, OPTIONS
                backoff:
                  firstBackoff: 1000ms
                  maxBackoff: 2000ms
                  factor: 2
                  # REMOVED: basedOnPreviousValue: true to prevent retry tracking state issues

        # 2. Product Service Route
        - id: product-service-route
          uri: ${PRODUCT_SERVICE_URI:http://localhost:8012}
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: DynamicRateLimiter
              args:
                routeId: product-service-route

            - name: Retry
              args:
                retries: 3
                # FIXED: Removed 'series: SERVER_ERROR' to prevent condition masking. 
                # Explicitly list all statuses (both 4xx and 5xx) right here.
                statuses: INTERNAL_SERVER_ERROR, BAD_GATEWAY, SERVICE_UNAVAILABLE, NOT_FOUND
                exceptions: 
                  - java.io.IOException
                  - java.net.ConnectException
                  - io.netty.channel.ConnectTimeoutException
                methods: GET, HEAD
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 200ms
                  factor: 2
                  # REMOVED: basedOnPreviousValue: true


  data:
    redis:
      # Kubernetes internal DNS to your Redis cluster/standalone service
      # host: redis-master.default.svc.cluster.local
      host: localhost # - local development 
      port: 6379
      # password: ${REDIS_PASSWORD} # Configure if using auth
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.value}


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    '[org.springframework.cloud.gateway]': DEBUG
    '[org.springframework.cloud.gateway.filter.factory.RetryGatewayFilterFactory]': TRACE