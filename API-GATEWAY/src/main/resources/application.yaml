server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      filter:
        request-rate-limiter:
          deny-empty-key: true
          empty-key-status-code: 429
      routes:
        # 1. User Service Route
        - id: user-service-route
          uri: ${USER_SERVICE_URI:http://localhost:8011}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: DynamicRateLimiter
              args:
                routeId: user-service-route

            - name: Retry
              args:
                retries: 3
                # >>> CRITICAL FIX: explicitly disable the default SERVER_ERROR series
                series: []
                statuses:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                  - GATEWAY_TIMEOUT
                exceptions:
                  - java.io.IOException
                  - java.net.ConnectException
                  - io.netty.channel.ConnectTimeoutException
                methods:
                  - GET
                  - HEAD
                  - OPTIONS
                backoff:
                  firstBackoff: 1000ms
                  maxBackoff: 2000ms
                  factor: 2
                  basedOnPreviousValue: true

        # 2. Product Service Route
        - id: product-service-route
          uri: ${PRODUCT_SERVICE_URI:http://localhost:8012}
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: DynamicRateLimiter
              args:
                routeId: product-service-route

            - name: Retry
              args:
                retries: 3
                # >>> CRITICAL FIX: explicitly disable the default SERVER_ERROR series
                series: []
                statuses:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                # NOT_FOUND removed — retrying 404 is pointless
                methods:
                  - GET
                  - HEAD
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 200ms
                  factor: 2
                  basedOnPreviousValue: true

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.value}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    '[org.springframework.cloud.gateway]': DEBUG
    '[org.springframework.cloud.gateway.filter.factory.RetryGatewayFilterFactory]': TRACE