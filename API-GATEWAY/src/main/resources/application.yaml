server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      route-definition-locator:
        cache:
          enabled: true
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      filter:
        request-rate-limiter:
          deny-empty-key: true
          empty-key-status-code: 429
      routes:
        # 1. User Service Route
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            # 1. BULKHEAD FIRST: Protect gateway threads/resources immediately
            - name: Bulkhead
              args:
                name: userServiceBulkhead
                # Optional: fallbackUri if bulkhead is full (sharing your service-unavailable endpoint)
                fallbackUri: forward:/fallback/service-unavailable

            # 2. CIRCUIT BREAKER SECOND: Tracks failure/success ratios
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback/service-unavailable

            # 3. RETRY THIRD: Handles internal transient drops
            - name: Retry
              args:
                retries: 3
                cacheBody: true
                series: [] 
                statuses:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                  - GATEWAY_TIMEOUT
                exceptions:
                  - java.io.IOException
                  - java.net.ConnectException
                  - io.netty.channel.ConnectTimeoutException
                methods: GET, HEAD, OPTIONS
                backoff:
                  firstBackoff: 1000ms
                  maxBackoff: 2000ms
                  factor: 2

            # 4. RATE LIMITER LAST
            - name: DynamicRateLimiter
              args:
                routeId: user-service-route

        # 2. Product Service Route
        - id: product-service-route
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**
          filters:
            # 1. BULKHEAD FIRST
            - name: Bulkhead
              args:
                name: productServiceBulkhead
                fallbackUri: forward:/fallback/service-unavailable

            # 2. CIRCUIT BREAKER
            - name: CircuitBreaker
              args:
                name: productServiceCircuitBreaker
                fallbackUri: forward:/fallback/service-unavailable

            - name: Retry
              args:
                retries: 1
                cacheBody: true
                series: []
                statuses:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                methods: GET, HEAD
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 200ms
                  factor: 2

            - name: DynamicRateLimiter
              args:
                routeId: product-service-route

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.value}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: when_authorized
  health:
    circuitbreakers:
      enabled: false

logging:
  level:
    '[org.springframework.cloud.gateway]': DEBUG
    '[io.github.resilience4j.circuitbreaker]': DEBUG
    '[io.github.resilience4j.bulkhead]': DEBUG

# ==========================================
# RESILIENCE4J PATTERNS CONFIGURATION
# ==========================================
resilience4j:
  # --- NEW: Bulkhead Limits Configuration ---
  bulkhead:
    configs:
      default:
        # Max concurrent requests allowed down this route pipeline
        maxConcurrentCalls: 20
        # If the bulkhead is saturated, how long a thread can wait in queue before being rejected
        maxWaitDuration: 20ms
    instances:
      userServiceBulkhead:
        baseConfig: default
        maxConcurrentCalls: 50 # Giving user service a larger pool size
      productServiceBulkhead:
        baseConfig: default
        maxConcurrentCalls: 20

  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: false
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.ConnectException
          - io.netty.channel.ConnectTimeoutException
          - org.springframework.web.server.ResponseStatusException
          - java.util.concurrent.TimeoutException
    instances:
      userServiceCircuitBreaker:
        baseConfig: default
      productServiceCircuitBreaker:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
        cancelRunningFuture: true