server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      filter:
        request-rate-limiter:
          deny-empty-key: true
          empty-key-status-code: 429
      routes:
        # 1. User Service Route (No Rate Limiting applied)
        - id: user-service-route
          uri: ${USER_SERVICE_URI:http://localhost:8011}
          predicates:
            - Path=/api/v1/users/**

        # 2. Product Service Route (Dynamic Rate Limiting applied)
        - id: product-service-route
          uri: ${PRODUCT_SERVICE_URI:http://localhost:8012}
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: DynamicRateLimiter          # Matches your custom filter factory prefix
              args:
                routeId: product-service-route


  data:
    redis:
      # Kubernetes internal DNS to your Redis cluster/standalone service
      # host: redis-master.default.svc.cluster.local
      host: localhost # - local development 
      port: 6379
      # password: ${REDIS_PASSWORD} # Configure if using auth
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.value}


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG